<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>₿びっぷよ — VS CPU Edition</title>
<meta name="description" content="1000sats払ってCPUと対戦！ビットコインのmempoolが降ってくる落ち物パズルゲーム。">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap');

:root {
  --bg:         #d4cec8;
  --panel:      #e8e4dc;
  --panel-bdr:  #b8b0a9;
  --game-bg:    #110f0d; 
  --text:       #423a31;
  --text-dim:   #756b62;
  --text-mid:   #5c5246;
  --amber:      #9c6321;
  --amber-dim:  #7a4d1a;
  --gold:       #a8841a;
  --green:      #268a3c;
  --font-hud:  'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--bg);}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-mono);
  min-height:100vh; display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;user-select:none; position:relative;
}

#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}

header{
  position:relative;z-index:10; width:100%;max-width:1400px;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px 10px; border-bottom:1px solid var(--panel-bdr);
}
h1.logo{font-family:var(--font-hud);font-size:1.6rem;font-weight:900;letter-spacing:.1em;color:var(--amber); margin: 0;}
h1.logo .b{color:var(--gold);}
.sub{font-size:.6rem;color:var(--text-dim);letter-spacing:.18em;margin-top:2px;}
.pill{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--panel-bdr);border-radius:20px;padding:4px 12px;font-size:.58rem;color:var(--text-dim);}
.dot{width:7px;height:7px;border-radius:50%;background:#888;}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}

#app{
  position:relative;z-index:10; display:grid;
  grid-template-columns: 220px minmax(300px, 450px) 220px;
  grid-template-areas: "lc cc next" "lc cc rc";
  gap: 20px; padding: 24px 20px 40px; width: 100%; max-width: 1200px;
  justify-content: center; align-items: start; transition: 0.3s;
}
#app.vs-mode { grid-template-columns: 220px minmax(650px, 850px) 220px; max-width: 1400px; }

.pnl{background:var(--panel);border:1px solid var(--panel-bdr);border-radius:5px;padding:12px 14px;box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
.lbl{font-family:var(--font-hud);font-size:.55rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.ico{color:var(--amber);font-size:.7rem;}
.vbig{font-family:var(--font-hud);font-size:2rem;font-weight:900;color:var(--amber);line-height:1;}
.vmid{font-family:var(--font-hud);font-size:1.2rem;font-weight:700;color:var(--amber);line-height:1.2;}
.vsub{font-size:.62rem;color:var(--text-dim);margin-top:2px;}

#lc{grid-area:lc; display:flex;flex-direction:column;gap:12px;}
.sleg{display:flex;flex-direction:column;gap:4px;}
.srow{display:flex;align-items:center;gap:7px;font-size:.65rem;}
.sw{width:26px;height:9px;border-radius:2px;}
#ql{display:flex;flex-direction:column;gap:3px;margin-top:7px;}
.qi{display:flex;align-items:center;gap:6px;font-size:.6rem;color:var(--text-dim);padding:3px 0;border-bottom:1px solid var(--panel-bdr);}

#cc{grid-area:cc; display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
#gw{
  position:relative; background:var(--game-bg); border:2px solid var(--amber-dim);
  border-radius:6px; box-shadow:0 0 35px rgba(0,0,0,.15),inset 0 0 50px rgba(0,0,0,.8);
  overflow: hidden; height: 70vh; min-height: 500px; aspect-ratio: 1/2; margin: 0 auto; transition: 0.3s;
}
#gw.vs-mode { aspect-ratio: auto; width: 100%; min-width: 650px; }
#gc{width: 100%; height: 100%; display: block;}

#bflash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(255,215,100,.95) 0%,rgba(213,208,200,.95) 100%);pointer-events:none;opacity:0;z-index:15;}
#bflash.show{animation:bf 3.5s forwards;}
@keyframes bf{0%{opacity:1}60%{opacity:1}100%{opacity:0}}
.ft{font-family:var(--font-hud);font-size:1.5rem;font-weight:900;color:#000;}

#cpop{position:absolute;top:26%;left:50%;transform:translateX(-50%);font-family:var(--font-hud);font-size:2.4rem;font-weight:900;color:var(--gold);pointer-events:none;opacity:0;z-index:18;}

.sov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(232,228,220,.95);z-index:20;text-align:center;padding:20px;border:1px solid var(--panel-bdr);}
.stitle{font-family:var(--font-hud);font-size:2.2rem;font-weight:900;color:var(--amber);margin-bottom:10px;}
.sdesc{font-size:.7rem;color:var(--text-mid);line-height:2;margin-bottom:22px;}
.sscore{font-family:var(--font-hud);font-size:2.5rem;font-weight:900;color:var(--gold);margin-bottom:22px;}
.sbtn{
  font-family:var(--font-hud);font-size:.9rem;font-weight:700;letter-spacing:.1em;
  padding:14px 28px;background:var(--amber);color:#fff;border:none;border-radius:4px;cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,.15);transition:0.15s; width: 100%; max-width: 300px;
}
.sbtn:hover{transform:scale(1.04);}

#mctrl{display:none;flex-direction:column;gap:8px;width:100%;max-width:400px;}
#pnl-next{grid-area:next;}
#nwrap{width:100%;height:140px;background:var(--game-bg);border-radius:4px;border:2px solid var(--panel-bdr);display:flex;align-items:center;justify-content:center;}
#nwrap canvas { width: 100%; height: 100%; object-fit: contain; }

#rc{grid-area:rc; display:flex;flex-direction:column;gap:12px;}
.clist{display:flex;flex-direction:column;gap:5px;}
.cri{display:flex;align-items:center;gap:7px;font-size:.62rem;color:var(--text-dim);}
.ck{font-family:var(--font-hud);font-size:.55rem;background:#dcd6cc;border:1px solid var(--panel-bdr);border-radius:3px;padding:3px 6px;}

#txstream{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow:hidden;}
.txl{font-size:.6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

@media(max-width:960px){
  #app{ grid-template-columns:190px auto 190px; }
  #app.vs-mode { grid-template-columns: 1fr; grid-template-areas: "cc" "lc" "rc"; }
  #gw.vs-mode { min-width: 100%; height: 50vh; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1 class="logo"><span class="b">₿</span>びっぷよ</h1>
    <div class="sub">Bitcoin TX Falling Puzzle</div>
  </div>
  <div class="pill"><div class="dot" id="wsdot"></div><span id="wslbl">mempool.space</span></div>
</header>

<div id="app">
  <div id="lc">
    <div class="pnl">
      <div class="lbl"><span class="ico">⛏</span>Block Height</div>
      <div class="vbig" id="bh">——</div>
    </div>
    <div class="pnl">
      <div class="lbl"><span class="ico">◈</span>Score (P1)</div>
      <div class="vbig" id="score">0</div>
    </div>
    <div class="pnl">
      <div class="lbl"><span class="ico">⚡</span>Queue</div>
      <div id="ql"></div>
    </div>
    <div class="pnl">
      <div class="lbl"><span class="ico">▦</span>Piece Size</div>
      <div class="sleg" id="sleg"></div>
    </div>
  </div>

  <div id="cc">
    <div id="gw">
      <canvas id="gc"></canvas>
      <div id="cpop"></div>
      <div id="bflash">
        <div class="ft">⛏ BLOCK MINED</div>
        <div class="ft" id="flh" style="font-size:2.5rem;margin-top:4px;">#000000</div>
      </div>

      <div id="ss" class="sov">
        <div class="stitle">₿びっぷよ</div>
        <div class="sdesc">同じ色を4個以上つなげて消そう！<br>連鎖でおじゃまブロックを相手に送れ！</div>
        <button class="sbtn" id="startbtn" style="margin-bottom:12px;">▶ START SOLO</button>
        <button class="sbtn" id="startvsbtn" style="background:#f5a623; color:#000; text-shadow:0 1px 2px rgba(255,255,255,0.4);"><span class="ico" style="color:#000">⚡</span> VS CPU (1000 sats)</button>
      </div>

      <div id="gs" class="sov" style="display:none">
        <div class="stitle" id="go-title" style="color:#ff4d4d">GAME OVER</div>
        <div class="sscore" id="goscore" style="margin-bottom:20px;">0</div>

  <div class="pnl" id="pnl-next">
    <div class="lbl"><span class="ico">→</span>Next</div>
    <div id="nwrap"><canvas id="nc"></canvas></div>
  </div>

  <div id="rc">
    <div class="pnl">
      <div class="lbl"><span class="ico">⌨</span>Controls</div>
      <div class="clist">
        <div class="cri"><span class="ck">X / ↑</span><span>Rotate CW</span></div>
        <div class="cri"><span class="ck">Z</span><span>Rotate CCW</span></div>
        <div class="cri"><span class="ck">← →</span><span>Move</span></div>
        <div class="cri"><span class="ck">SPACE</span><span>Hard Drop</span></div>
      </div>
    </div>
    <div class="pnl">
      <div class="lbl"><span class="ico">〜</span>TX Stream</div>
      <div id="txstream"></div>
    </div>

</div>

<script>
const COLS=6, ROWS=12, CELL=60; 
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const nctx=document.getElementById('nc').getContext('2d');
document.getElementById('nc').width = 240; document.getElementById('nc').height = 240;

const PUYO_COLORS = {
  red:    { base: 'rgba(255, 20,  20,  0.2)', glow: '#ff0033', edge: '#ff7878', inner: 'rgba(220, 0,   0,   0.8)' },
  orange: { base: 'rgba(255, 100, 0,   0.2)', glow: '#ff6600', edge: '#ffb450', inner: 'rgba(230, 80,  0,   0.8)' },
  cyan:   { base: 'rgba(0,   200, 255, 0.2)', glow: '#00ccff', edge: '#96f0ff', inner: 'rgba(0,   160, 220, 0.8)' },
  green:  { base: 'rgba(20,  255, 20,  0.2)', glow: '#00ff33', edge: '#96ff96', inner: 'rgba(0,   200, 0,   0.8)' },
  yellow: { base: 'rgba(255, 220, 0,   0.2)', glow: '#ffcc00', edge: '#ffff96', inner: 'rgba(230, 190, 0,   0.8)' },
  dust:   { base: 'rgba(100, 100, 100, 0.8)', glow: '#888888', edge: '#cccccc', inner: 'rgba(80, 80, 80, 0.9)' }
};
const PUYO_IDS = ['red', 'orange', 'cyan', 'green', 'yellow'];
const C_MAP = { red: '#ff5555', orange: '#ff8800', cyan: '#00ddff', green: '#55ff55', yellow: '#ffea00', dust: '#aaaaaa' };

const TIERS=[
  {min:1e9, size:6,name:'>10₿',   colorId:'orange', mono:true},
  {min:1e8, size:5,name:'>1₿',    colorId:'yellow', mono:false},
  {min:1e7, size:4,name:'>0.1₿',  colorId:'green',  mono:false},
  {min:5e6, size:3,name:'>0.05₿', colorId:'cyan',   mono:false},
  {min:1e4, size:2,name:'Normal', colorId:'cyan',   mono:false},
  {min:0,   size:1,name:'Dust',   colorId:'dust',   mono:true},
];
function getTier(s){for(const t of TIERS)if(s>=t.min)return t;return TIERS[TIERS.length-1];}
function txSats(tx){return tx._s || (Array.isArray(tx.vout)?tx.vout.reduce((a,o)=>a+(o.value||0),0):0);}
function rCol(){return PUYO_IDS[Math.floor(Math.random()*PUYO_IDS.length)];}

function buildCells(tier){
  const sz=tier.size, c0=rCol(), col=t=>t.mono?c0:rCol();
  if(sz===1)return [{dr:0,dc:0,colorId:c0}];
  if(sz===2)return [{dr:0,dc:0,colorId:c0},{dr:-1,dc:0,colorId:col(tier)}];
  if(sz===3)return [{dr:0,dc:0,colorId:c0},{dr:-1,dc:0,colorId:col(tier)},{dr:-1,dc:1,colorId:col(tier)}];
  if(sz===4)return [{dr:0,dc:0},{dr:-1,dc:0},{dr:-2,dc:0},{dr:-1,dc:1}].map(p=>({...p,colorId:col(tier)}));
  if(sz===5)return [{dr:0,dc:0},{dr:-1,dc:0},{dr:-2,dc:0},{dr:-3,dc:0},{dr:-4,dc:0}].map(p=>({...p,colorId:col(tier)}));
  return [{dr:0,dc:-2},{dr:0,dc:-1},{dr:0,dc:0},{dr:0,dc:1},{dr:0,dc:2},{dr:0,dc:3}].map(p=>({...p,colorId:c0}));
}

class Piece {
  constructor(tx){
    this.tx=tx; this.sats=txSats(tx); this.tier=getTier(this.sats);
    this.cells=buildCells(this.tier); this.pr=1; this.pc=Math.floor(COLS/2);
  }
  abs(){return this.cells.map(c=>({r:this.pr+c.dr,c:this.pc+c.dc,colorId:c.colorId}));}
  rotateCW(){this.cells=this.cells.map(c=>({dr:c.dc,dc:-c.dr,colorId:c.colorId}));}
  rotateCCW(){this.cells=this.cells.map(c=>({dr:-c.dc,dc:c.dr,colorId:c.colorId}));}
}

// ----------------------------------------------------
// PLAYER STATE & LOGIC
// ----------------------------------------------------
class Player {
  constructor(id, isCPU, offsetX) {
    this.id = id; this.isCPU = isCPU; this.offsetX = offsetX;
    this.board = Array.from({length:ROWS},()=>new Array(COLS).fill(null));
    this.score = 0; this.chain = 0; this.state = 'IDLE';
    this.active = null; this.nextPiece = null;
    this.dropT = 0; this.eraseT = 0; this.eCells = [];
    this.ojamaQueue = 0; this.targetCol = -1;
  }
  canPlace(cells){
    for(const c of cells){
      if(c.c<0||c.c>=COLS||c.r>=ROWS)return false;
      if(c.r>=0&&this.board[c.r][c.c]!==null)return false;
    }
    return true;
  }
  mv(dr,dc){
    if(!this.active)return false;
    const nc2=this.active.abs().map(c=>({...c,r:c.r+dr,c:c.c+dc}));
    if(this.canPlace(nc2)){this.active.pr+=dr;this.active.pc+=dc;return true;}
    return false;
  }
  rot(dir){
    if(!this.active)return;
    const bk=this.active.cells.map(c=>({...c}));
    dir==='cw'?this.active.rotateCW():this.active.rotateCCW();
    for(const[dr,dc]of[[0,0],[0,1],[0,-1],[0,2],[0,-2],[-1,0],[-2,0]]){
      const test=this.active.cells.map(c=>({r:this.active.pr+c.dr+dr,c:this.active.pc+c.dc+dc,colorId:c.colorId}));
      if(this.canPlace(test)){this.active.pr+=dr;this.active.pc+=dc; if(!this.isCPU)sfx('rotate'); return;}
    }
    this.active.cells=bk;
  }
  hardDrop(){ if(!this.active||this.state!=='PLAY')return; while(this.mv(1,0)){} this.lock(); }
  lock(){ this.active.abs().forEach(c=>{if(c.r>=0&&c.r<ROWS)this.board[c.r][c.c]=c.colorId;}); if(!this.isCPU)sfx('land'); this.active=null; this.state='FALL'; }
  gravity(){
    let m=false;
    for(let c=0;c<COLS;c++)for(let r=ROWS-2;r>=0;r--)
      if(this.board[r][c]&&!this.board[r+1][c]){
        let nr=r;while(nr+1<ROWS&&!this.board[nr+1][c])nr++;
        this.board[nr][c]=this.board[r][c];this.board[r][c]=null;m=true;
      }
    return m;
  }
  findGroups(){
    const vis=Array.from({length:ROWS},()=>new Array(COLS).fill(0)),out=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.board[r][c]&&!vis[r][c]&&this.board[r][c]!=='dust'){
      const col=this.board[r][c], grp=[], q=[{r,c}]; vis[r][c]=1; let h=0;
      while(h<q.length){
        const {r:cr,c:cc}=q[h++]; grp.push({r:cr,c:cc});
        for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const nr=cr+dr,nc=cc+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!vis[nr][nc]&&this.board[nr][nc]===col){vis[nr][nc]=1;q.push({r:nr,c:nc});}
        }
      }
      if(grp.length>=4)out.push(grp);
    }
    return out;
  }
  clearDust(groups) {
    let dusts = [];
    groups.flat().forEach(c => {
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=c.r+dr, nc=c.c+dc;
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&this.board[nr][nc]==='dust') dusts.push({r:nr, c:nc});
      });
    });
    return dusts.filter((v,i,a)=>a.findIndex(t=>(t.r===v.r&&t.c===v.c))===i);
  }
  spawn(){
    if(!this.nextPiece) return false;
    this.active=this.nextPiece; this.active.pr=1; this.active.pc=Math.floor(COLS/2);
    this.nextPiece=null;
    return this.canPlace(this.active.abs());
  }
}

// ----------------------------------------------------
// GAME ENGINE
// ----------------------------------------------------
let players=[], txQ=[], gameOn=false, AF=0, blockH=null;
let keys={}, parts=[], fTexts=[], lightnings=[];

function loadNextFor(p){
  if(!p.nextPiece && txQ.length>0){
    const tx = txQ[Math.floor(Math.random()*Math.min(txQ.length,5))];
    p.nextPiece = new Piece({...tx});
    if(!p.isCPU) { updateNextUI(p); updateQ(); }
  }
}

function cpuThink(p) {
  if (!p.active) return;
  if (p.targetCol === -1) {
    let validCols = [];
    for(let c=0; c<COLS; c++) if(p.board[0][c] === null) validCols.push(c);
    p.targetCol = validCols.length ? validCols[Math.floor(Math.random()*validCols.length)] : 2;
  }
  if (p.active.pc > p.targetCol) p.mv(0, -1);
  else if (p.active.pc < p.targetCol) p.mv(0, 1);
  else { p.rot(Math.random() > 0.5 ? 'cw' : 'ccw'); p.hardDrop(); p.targetCol = -1; }
}

function update(){
  AF++;
  for(let i=parts.length-1;i>=0;i--){parts[i].step();if(parts[i].life<=0)parts.splice(i,1);}
  for(let i=fTexts.length-1;i>=0;i--){fTexts[i].step();if(fTexts[i].life<=0)fTexts.splice(i,1);}
  for(let i=lightnings.length-1;i>=0;i--){lightnings[i].life--;if(lightnings[i].life<=0)lightnings.splice(i,1);}
  
  if(!gameOn)return;
  
  players.forEach((p, idx) => {
    if(p.state==='IDLE') return;

    if(p.state==='PLAY'){
      if(!p.active){
        if(p.ojamaQueue > 0) {
          let dropCount = Math.min(p.ojamaQueue, COLS);
          p.ojamaQueue -= dropCount;
          for(let i=0; i<dropCount; i++) {
            let c = Math.floor(Math.random() * COLS);
            if(p.board[0][c] === null) p.board[0][c] = 'dust';
          }
          p.state = 'FALL'; return;
        }
        if(!p.nextPiece){loadNextFor(p);return;}
        if(!p.spawn()){gameOver(p.isCPU ? 'YOU WIN! 🎉' : 'CPU WINS! ☠️');return;}
      }

      if(p.isCPU) {
        if(++p.dropT >= 20) { p.dropT=0; cpuThink(p); }
        if(AF % 40 === 0) { if(!p.mv(1,0)) p.lock(); }
      } else {
        const soft = keys['ArrowDown']||keys['KeyS'];
        const iv = soft ? 3 : Math.max(8, 36 - Math.floor(p.score/3000));
        if(++p.dropT >= iv) { p.dropT=0; if(!p.mv(1,0)) p.lock(); }
      }
    }
    else if(p.state==='FALL'){
      if(!p.gravity()){
        const gs = p.findGroups();
        if(gs.length){
          p.eCells = gs.flat().concat(p.clearDust(gs));
          p.eraseT = 32; p.chain++; p.state = 'ERASE';
          if(!p.isCPU) sfx('chain');

          const pts = p.eCells.length * 100 * p.chain * p.chain;
          p.score += pts;
          let ojama = Math.floor(pts / 1500); 
          if(ojama > 0) { const opp = players[1-idx]; if(opp) opp.ojamaQueue += ojama; }
          
          let cx = p.offsetX + COLS*CELL/2, cy = ROWS*CELL/2;
          const chainColor = p.chain === 1 ? '#ffd040' : p.chain === 2 ? '#ff6600' : '#ff3333';
          fTexts.push(new FloatingText(cx, cy, `${p.chain}連鎖!`, chainColor, 34));
        } else { p.chain=0; p.state='PLAY'; }
      }
    }
    else if(p.state==='ERASE'){
      if(--p.eraseT<=0){
        p.eCells.forEach(c=>{
          for(let i=0;i<4;i++) parts.push(new Part(p.offsetX + c.c*CELL+CELL/2, c.r*CELL+CELL/2, p.board[c.r][c.c]));
          p.board[c.r][c.c]=null;
        });
        p.eCells=[]; p.state='FALL';
        if(!p.isCPU) document.getElementById('score').textContent = p.score.toLocaleString();
      }
    }
  });
}

function drawP(c,px,py,sz,colorId,nb={},al=1){
  const cd = PUYO_COLORS[colorId] || PUYO_COLORS.red;
  const cx = px + sz/2, cy = py + sz/2;
  c.globalAlpha = al;
  const rad = sz*0.44, bw = sz*0.7, h = sz/2 + 2;
  
  c.shadowBlur = 15; c.shadowColor = cd.glow; c.fillStyle = cd.base;
  c.beginPath(); c.arc(cx, cy, rad, 0, Math.PI*2); c.fill();
  if(nb.u) c.fillRect(cx - bw/2, py - 1, bw, h); if(nb.d) c.fillRect(cx - bw/2, cy - 1, bw, h);
  if(nb.l) c.fillRect(px - 1, cy - bw/2, h, bw); if(nb.r) c.fillRect(cx - 1, cy - bw/2, h, bw);
  
  c.shadowBlur = 0; c.fillStyle = cd.edge;
  c.beginPath(); c.arc(cx, cy, sz*0.40, 0, Math.PI*2); c.fill();
  
  c.fillStyle = cd.inner;
  c.beginPath(); c.arc(cx, cy, sz*0.32, 0, Math.PI*2); c.fill();
  
  if(colorId !== 'dust') {
    c.fillStyle = 'rgba(255,255,255,0.9)';
    c.beginPath(); c.ellipse(cx-sz*.14, cy-sz*.06, sz*.09, sz*.13, 0, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(cx+sz*.14, cy-sz*.06, sz*.09, sz*.13, 0, 0, Math.PI*2); c.fill();
    c.fillStyle = '#111';
    c.beginPath(); c.arc(cx-sz*.11, cy-sz*.04, sz*.05, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+sz*.17, cy-sz*.04, sz*.05, 0, Math.PI*2); c.fill();
  }
  c.globalAlpha = 1;
}

function nbB(p,r,c,col){
  const g=(dr,dc)=>{const nr=r+dr,nc=c+dc;return nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&p.board[nr][nc]===col;};
  return{u:g(-1,0),d:g(1,0),l:g(0,-1),r:g(0,1)};
}
function nbM(r,c,col,m){
  const g=(dr,dc)=>!!(m[r+dr]&&m[r+dr][c+dc]===col);
  return{u:g(-1,0),d:g(1,0),l:g(0,-1),r:g(0,1)};
}
function getPM(cells){ const m={};cells.forEach(c=>{if(!m[c.r])m[c.r]={};m[c.r][c.c]=c.colorId;});return m; }

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  players.forEach((p) => {
    ctx.save();
    ctx.translate(p.offsetX, 0);
    
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, COLS*CELL, ROWS*CELL);
    ctx.strokeStyle='rgba(255, 255, 255, 0.05)'; ctx.lineWidth=2; ctx.beginPath();
    for(let x=0;x<=COLS*CELL;x+=CELL){ctx.moveTo(x,0);ctx.lineTo(x,ROWS*CELL);}
    for(let y=0;y<=ROWS*CELL;y+=CELL){ctx.moveTo(0,y);ctx.lineTo(COLS*CELL,y);}
    ctx.stroke();

    if(p.ojamaQueue > 0) {
      ctx.fillStyle = 'rgba(255, 50, 50, 0.9)'; ctx.font = '900 24px Orbitron'; ctx.textAlign = 'center';
      ctx.fillText(`⚠️ +${p.ojamaQueue}`, COLS*CELL/2, 30);
    }

    const eSet=new Set(p.eCells.map(c=>`${c.r},${c.c}`));
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(p.board[r][c]){
      let al=1, sx=1, sy=1;
      if(eSet.has(`${r},${c}`) && p.state==='ERASE') {
        const prog = (32 - p.eraseT) / 32; 
        al = 1 - prog; sx = 1 + prog*0.5; sy = 1 - prog*0.5;
      }
      ctx.save();
      ctx.translate(c*CELL + CELL/2, r*CELL + CELL/2);
      ctx.scale(sx, sy);
      ctx.translate(-(c*CELL + CELL/2), -(r*CELL + CELL/2));
      drawP(ctx, c*CELL, r*CELL, CELL, p.board[r][c], nbB(p,r,c,p.board[r][c]), al);
      ctx.restore();
    }
    
    if(p.state==='PLAY'&&p.active){
      let gpr=p.active.pr;
      while(p.canPlace(p.active.cells.map(c=>({r:gpr+1+c.dr,c:p.active.pc+c.dc,colorId:c.colorId}))))gpr++;
      if(gpr!==p.active.pr){
        p.active.cells.forEach(c=>{
          const gr=gpr+c.dr,gc=p.active.pc+c.dc;
          if(gr>=0&&gr<ROWS&&gc>=0&&gc<COLS){
            ctx.globalAlpha=.15; ctx.fillStyle=C_MAP[c.colorId]||'#fff';
            ctx.beginPath();ctx.arc(gc*CELL+CELL/2,gr*CELL+CELL/2,CELL*.38,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
          }
        });
      }
      const pm=getPM(p.active.abs());
      p.active.abs().forEach(c=>{if(c.r>=0&&c.r<ROWS)drawP(ctx,c.c*CELL,c.r*CELL,CELL,c.colorId,nbM(c.r,c.c,c.colorId,pm));});
    }
    ctx.restore();
  });
  
  parts.forEach(p=>p.draw(ctx)); fTexts.forEach(f=>f.draw(ctx));
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ----------------------------------------------------
// UI & INPUT
// ----------------------------------------------------
window.addEventListener('keydown',e=>{
  if (e.repeat) return; keys[e.code]=true;
  let p = players[0];
  if(!p || p.state!=='PLAY'||!p.active)return;
  if(e.code==='Space'){e.preventDefault();p.hardDrop();}
  if(e.code==='KeyZ'){e.preventDefault();p.rot('ccw');}
  if(e.code==='KeyX'||e.code==='ArrowUp'){e.preventDefault();p.rot('cw');}
  if(e.code==='ArrowLeft'){e.preventDefault(); p.mv(0,-1); }
  if(e.code==='ArrowRight'){e.preventDefault(); p.mv(0,1); }
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function updateNextUI(p){
  nctx.clearRect(0,0,nctx.canvas.width,nctx.canvas.height);
  if(!p.nextPiece) return;
  const cells = p.nextPiece.cells;
  const minR=Math.min(...cells.map(c=>c.dr)), maxR=Math.max(...cells.map(c=>c.dr));
  const minC=Math.min(...cells.map(c=>c.dc)), maxC=Math.max(...cells.map(c=>c.dc));
  const cs=Math.min(45,Math.floor(210/Math.max(maxC-minC+1, maxR-minR+1)));
  const ox=(240-(maxC-minC+1)*cs)/2, oy=(240-(maxR-minR+1)*cs)/2;
  const pm={}; cells.forEach(c=>{const dr=c.dr-minR,dc=c.dc-minC;if(!pm[dr])pm[dr]={};pm[dr][dc]=c.colorId;});
  cells.forEach(c=>{
    const dr=c.dr-minR,dc=c.dc-minC;
    drawP(nctx,ox+dc*cs,oy+dr*cs,cs,c.colorId,{u:pm[dr-1]&&pm[dr-1][dc]===c.colorId,d:pm[dr+1]&&pm[dr+1][dc]===c.colorId,l:pm[dr]&&pm[dr][dc-1]===c.colorId,r:pm[dr]&&pm[dr][dc+1]===c.colorId},1);
  });
}

function updateQ(){
  const el=document.getElementById('ql');
  el.innerHTML=txQ.slice(0,5).map(tx=>{
    const t=getTier(txSats(tx)), c=C_MAP[t.colorId];
    return `<div class="qi"><div class="dot" style="background:${c};box-shadow:0 0 5px ${c}"></div><span>${t.name}</span></div>`;
  }).join('');
}

// ----------------------------------------------------
// PAYMENT & INIT
// ----------------------------------------------------
async function payForCPU() {
  try {
    if (typeof window.webln !== 'undefined') {
      await window.webln.enable();
      // Dummy keysend for demo purposes
      await window.webln.keysend({
        destination: "032b4b45fc3bd652e92c2ab75b2259a4bbdf9efc2d5861de517efeb96cde6e2f17", 
        amount: 1000
      });
      startGame(true);
    } else {
      if(confirm("WebLN provider (like Alby) not found.\nSimulate payment of 1000 sats for demo?")) {
        startGame(true);
      }
    }
  } catch (e) {
    alert("Payment cancelled or failed.");
  }
}

function startGame(vsCPU = false){
  document.getElementById('ss').style.display='none'; 
  document.getElementById('gs').style.display='none';
  
  players = [new Player(0, false, 0)];
  if(vsCPU) {
    const margin = 80;
    players.push(new Player(1, true, COLS*CELL + margin));
    canvas.width = COLS*CELL*2 + margin;
    document.getElementById('gw').classList.add('vs-mode');
    document.getElementById('app').classList.add('vs-mode');
  } else {
    canvas.width = COLS*CELL;
    document.getElementById('gw').classList.remove('vs-mode');
    document.getElementById('app').classList.remove('vs-mode');
  }

  [5e5,2e6,1e4,8e7,3e5,5e8,1e3,4e6,2e3,1e5].forEach(s=> txQ.push({_s:s,vout:[{value:s}]}));
  players.forEach(p => { p.state = 'PLAY'; loadNextFor(p); });
  
  document.getElementById('score').textContent = '0';
  gameOn=true; gAC();
  if(!window.wsInit) connectWS();
}

function gameOver(msg){
  gameOn=false; players.forEach(p=>p.state='IDLE');
  document.getElementById('goscore').textContent = players[0].score.toLocaleString();
  const title = document.getElementById('go-title');
  title.textContent = msg; title.style.color = msg.includes('WINS') ? '#ffea00' : '#ff4d4d';
  document.getElementById('gs').style.display='flex'; sfx('boom');
}

document.getElementById('startbtn').addEventListener('click', ()=>startGame(false));
document.getElementById('restartbtn').addEventListener('click', ()=>startGame(players.length>1));
document.getElementById('startvsbtn').addEventListener('click', payForCPU);

// EFFECTS / AUDIO
let AC=null;
function gAC(){ try{ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); }catch(e){} return AC; }
function sfx(type){
  if(!AC)return; const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  if(type==='rotate'){o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(1100,t+.06);g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.1);}
  if(type==='land'){o.frequency.setValueAtTime(170,t);o.frequency.exponentialRampToValueAtTime(85,t+.08);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.15);}
  if(type==='chain'){o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.15);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.35);}
  if(type==='boom'){o.type='sawtooth';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(12,t+.55);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.65);}
}
class Part {
  constructor(x,y,colId){ this.x=x;this.y=y;this.color=PUYO_COLORS[colId]?.glow||'#fff'; const a=Math.random()*Math.PI*2,s=Math.random()*6+1.5; this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-2.5; this.life=1;this.r=Math.random()*5+3; }
  step(){this.x+=this.vx;this.vy+=0.2;this.y+=this.vy;this.life-=0.03;}
  draw(c){c.globalAlpha=Math.max(0,this.life);c.fillStyle=this.color;c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fill();c.globalAlpha=1;}
}
class FloatingText {
  constructor(x,y,txt,col,sz){this.x=x;this.y=y;this.txt=txt;this.col=col;this.sz=sz;this.life=60;this.vy=-2;}
  step(){this.y+=this.vy;this.vy*=0.92;this.life--;}
  draw(c){c.save();c.globalAlpha=Math.max(0,this.life/60);c.font=`900 ${this.sz}px 'Zen Kaku Gothic New'`;c.fillStyle=this.col;c.textAlign='center';c.fillText(this.txt,this.x,this.y);c.restore();}
}

function connectWS(){
  window.wsInit = true;
  const ws=new WebSocket('wss://mempool.space/api/v1/ws');
  ws.onopen=()=>{ ws.send(JSON.stringify({action:'want',data:['blocks','mempool-blocks']})); document.getElementById('wsdot').className='dot on'; };
  ws.onmessage=e=>{try{
    const d=JSON.parse(e.data);
    if(d.block){
      document.getElementById('bh').textContent=d.block.height.toLocaleString();
      if(gameOn){
        document.getElementById('flh').textContent='#'+d.block.height.toLocaleString();
        const fl=document.getElementById('bflash');fl.classList.remove('show');void fl.offsetWidth;fl.classList.add('show');
        sfx('boom');
        players.forEach(p => {
          let cl=0;
          for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(p.board[r][c]){
            cl++; for(let i=0;i<3;i++)parts.push(new Part(p.offsetX + c*CELL+CELL/2,r*CELL+CELL/2,p.board[r][c])); p.board[r][c]=null;
          }
          p.score+=cl*1000; p.active=null; p.eCells=[]; p.state='PLAY'; p.ojamaQueue=0;
        });
        document.getElementById('score').textContent = players[0].score.toLocaleString();
      }
    }
    if(d.transactions&&gameOn){
      for(const tx of d.transactions){ tx._s=txSats(tx); txQ.push(tx); }
      if(txQ.length>60){txQ.sort((a,b)=>txSats(b)-txSats(a));txQ=txQ.slice(0,60);}
      players.forEach(p=>{if(!p.nextPiece)loadNextFor(p);}); updateQ();
    }
  }catch(err){}};
}

document.getElementById('sleg').innerHTML=TIERS.map(t=>{ const c=C_MAP[t.colorId]; return `<div class="srow"><div class="sw" style="background:${c};box-shadow:0 0 5px ${c}55"></div>${t.name}</div>`; }).join('');
loop();
</script>
